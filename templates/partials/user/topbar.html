{% load static %}
<header class="topbar">
  <div class="top-left">
    <!-- MENU ICON TOP LEFT -->
    <button class="icon-pill" id="menuToggle" aria-label="Toggle menu">☰</button>
  </div>

  <div class="search">
    <span>🔎</span>
    <input type="text" placeholder="Search teams, departments, or managers…">
  </div>

  <div class="top-right">

    <!-- Notifications -->
    <div class="notification">
      <div class="icon-pill" id="notificationToggle" aria-label="Notifications">
        🔔 <span class="notif-badge">3</span>
      </div>

      <div class="notif-dropdown" id="notifDropdown">
        <div class="notif-header">Notifications</div>
        <div class="notif-item">
          <strong>New message</strong>
          <p>Frontend Team · 5 mins ago</p>
        </div>
        <div class="notif-item">
          <strong>Meeting reminder</strong>
          <p>Sprint Planning · Today 14:00</p>
        </div>
        <div class="notif-item">
          <strong>Team updated</strong>
          <p>Backend Services updated details</p>
        </div>
        <a href="#" class="view-all">View all notifications</a>
      </div>
    </div>

    <!-- Profile -->
    <div class="profile-dropdown">
      <div class="profile-link">
        <img class="avatar" src="{% static 'img/avatar.jpg' %}" alt="User avatar">
        <span class="profile-status" title="Online"></span>
        <span>John Deo</span>
        <span class="arrow">▾</span>
      </div>

      <div class="dropdown-menu">
        <a href="../dashboards/update-info.html">Update Profile</a>
        <a href="../accounts/user_login.html">Log Out</a>
      </div>
    </div>

  </div>
</header>
